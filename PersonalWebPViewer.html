<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal WebP Viewer</title>
    <style>
        :root {
            --bg-color: #0a0a0a; --card-bg: #1a1a1a; --accent-color: #00bcd4; --text-color: #f0f0f0;
            --thumb-w: 300px; --thumb-h: 300px;
        }
        body { font-family: system-ui, sans-serif; background: var(--bg-color); color: var(--text-color); margin: 0; overflow-x: hidden; }
        
        .sticky-header { position: sticky; top: 0; z-index: 100; background: rgba(10,10,10,0.9); backdrop-filter: blur(15px); padding: 10px 20px; border-bottom: 1px solid #333; }
        .controls-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; justify-content: center; }
        .control-group { display: flex; align-items: center; gap: 8px; background: #222; padding: 5px 12px; border-radius: 8px; font-size: 0.8rem; }
        
        button { padding: 6px 12px; border-radius: 4px; border: 1px solid #444; background: #333; color: white; cursor: pointer; font-size: 0.85rem; }
        button.primary { background: var(--accent-color); color: black; font-weight: bold; border: none; }
        button.secondary { background: #555; color: white; border: none; }
        button:hover { filter: brightness(1.2); }
        #btnLock.locked { background: var(--accent-color); color: black; }

        .switch { position: relative; display: inline-block; width: 34px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #444; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent-color); }
        input:checked + .slider:before { transform: translateX(14px); }

        #treeModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; display: none; justify-content: center; align-items: center; }
        .tree-content { background: #1e1e1e; width: 90vw; max-width: 800px; max-height: 85vh; border-radius: 12px; padding: 25px; display: flex; flex-direction: column; border: 1px solid #444; }
        .tree-body { overflow-y: auto; flex-grow: 1; margin: 20px 0; border: 1px solid #333; padding: 10px; background: #111; border-radius: 4px; }
        .tree-item { margin: 8px 0; font-size: 0.95rem; display: flex; align-items: center; gap: 10px; }

        .gallery { display: grid; padding: 20px; grid-template-columns: repeat(auto-fill, minmax(var(--thumb-w), 1fr)); gap: 15px; }
        .card { background: var(--card-bg); border-radius: 8px; overflow: hidden; transition: 0.2s; cursor: pointer; border: 2px solid transparent; }
        .card:hover { border-color: var(--accent-color); transform: translateY(-3px); }
        .card img { width: 100%; height: var(--thumb-h); object-fit: cover; display: block; background: #000; }
        .filename { padding: 6px; font-size: 0.75rem; text-align: center; color: #888; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        #lightbox { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        .img-container { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; overflow: hidden; cursor: grab; position: relative; }
        #lightboxImg { transition: transform 0.1s ease-out; position: absolute; }
        .lb-ui { position: absolute; color: white; z-index: 1010; }
        .close-btn { top: 20px; right: 20px; font-size: 24px; cursor: pointer; width: 44px; height: 44px; background: rgba(0,0,0,0.6); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid #444; }
        .nav-btn { top: 50%; transform: translateY(-50%); font-size: 40px; cursor: pointer; padding: 30px; opacity: 0; transition: 0.2s; }
        .img-container:hover ~ .nav-btn, .nav-btn:hover { opacity: 0.6; }
        #slideshowBar { bottom: 40px; display: flex; gap: 15px; background: rgba(20,20,20,0.9); padding: 10px 25px; border-radius: 40px; border: 1px solid #444; }
        .zoom-info { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.6); padding: 6px 12px; border-radius: 4px; font-family: monospace; color: var(--accent-color); }
    </style>
</head>
<body>

<div class="sticky-header">
    <div class="controls-row">
        <button id="btnPicker" class="primary">📂 選擇資料夾</button>
        <button id="btnReselect" class="secondary" style="display:none;">🔄 變更範圍</button>
        <button id="btnQuickLoad" style="display:none; background:#4caf50;">⚡ 快速載入</button>
        
        <div class="control-group">🔍 <input type="text" id="search" placeholder="搜尋..." style="width: 70px; background:#111; border:none; color:white;"></div>
        <div class="control-group">
            寬 <input type="range" id="wRange" min="100" max="800" value="300" style="width: 60px;">
            <button id="btnLock" class="locked">🔒</button>
            高 <input type="range" id="hRange" min="100" max="800" value="300" style="width: 60px;">
        </div>
        <div class="control-group">
            排序 <select id="sortType" style="border:none; background:transparent; color:white;">
                <option value="default">預設</option>
                <option value="random">隨機</option>
                <option value="name">檔名</option>
                <option value="folder">資料夾</option>
                <option value="date">日期</option>
                <option value="size">大小</option>
            </select>
            <button id="btnSortOrder">↑</button>
            <button id="btnShuffle">🔀</button>
        </div>
        <div class="control-group">
            ⏱️ <input type="range" id="speedRange" min="0.5" max="15" step="0.5" value="3" style="width: 40px;">
            <span id="speedDisplay" style="color:var(--accent-color); min-width:25px;">3s</span>
            <label class="switch" title="顯示播放鈕"><input type="checkbox" id="showSlideTools"><span class="slider"></span></label>
        </div>
        <button id="btnFullscreen">🔲</button>
        <span id="status" style="font-size: 0.75rem; opacity: 0.7;"></span>
    </div>
</div>

<div id="treeModal">
    <div class="tree-content">
        <h3 style="margin:0 0 10px 0;">📁 選取掃描範圍 (Personal WebP Viewer)</h3>
        <p style="font-size:0.8rem; color:#aaa; margin:0;">勾選資料夾會自動聯動子目錄：</p>
        <div class="tree-body" id="treeBody"></div>
        <div style="display:flex; gap:10px; justify-content: flex-end;">
            <button onclick="document.getElementById('treeModal').style.display='none'">取消</button>
            <button class="primary" id="btnStartScan">確認並開始掃描</button>
        </div>
    </div>
</div>

<div class="gallery" id="gallery"></div>

<div id="lightbox">
    <div class="zoom-info" id="zoomInfo">Zoom: Fit</div>
    <div class="lb-ui close-btn" onclick="closeLightbox()">✕</div>
    <div class="lb-ui nav-btn" style="left:10px;" onclick="changeImg(-1)">❮</div>
    <div class="lb-ui nav-btn" style="right:10px;" onclick="changeImg(1)">❯</div>
    <div class="img-container" id="imgContainer"><img id="lightboxImg" src=""></div>
    <div id="slideshowBar" class="lb-ui" style="display:none;"><button id="btnSlideshow" style="border-radius:20px; padding:6px 25px; background:var(--accent-color); color:black; border:none; font-weight:bold;">▶ 開始播放</button></div>
</div>

<script>
    let allFiles = []; 
    let currentIndex = 0, isSlideshow = false, slideTimer = null;
    let zoomLevel = 1, moveX = 0, moveY = 0, isLocked = true, currentRatio = 1, sortOrder = 'asc';
    let folderMap = new Map();
    let currentRootHandle = null;

    const gallery = document.getElementById('gallery'), lbImg = document.getElementById('lightboxImg'), lb = document.getElementById('lightbox');
    const treeModal = document.getElementById('treeModal'), treeBody = document.getElementById('treeBody');
    const wRange = document.getElementById('wRange'), hRange = document.getElementById('hRange');
    const container = document.getElementById('imgContainer');

    window.onload = () => { 
        currentRatio = parseInt(wRange.value) / parseInt(hRange.value); 
        checkLastFolder(); 
        console.log("✅ Personal WebP Viewer Initialized.");
    };

    // --- 比例控制 ---
    wRange.oninput = (e) => {
        const val = e.target.value; document.documentElement.style.setProperty('--thumb-w', val + 'px');
        if (isLocked) { hRange.value = Math.round(val / currentRatio); document.documentElement.style.setProperty('--thumb-h', hRange.value + 'px'); }
    };
    hRange.oninput = (e) => {
        const val = e.target.value; document.documentElement.style.setProperty('--thumb-h', val + 'px');
        if (isLocked) { wRange.value = Math.round(val * currentRatio); document.documentElement.style.setProperty('--thumb-w', wRange.value + 'px'); }
    };
    document.getElementById('btnLock').onclick = function() {
        isLocked = !isLocked; this.innerText = isLocked ? '🔒' : '🔓'; this.classList.toggle('locked', isLocked);
        if (isLocked) currentRatio = parseInt(wRange.value) / parseInt(hRange.value);
    };

    // --- 聯動勾選 ---
    function toggleChildren(parentCheckbox) {
        const parentPath = parentCheckbox.value;
        const isChecked = parentCheckbox.checked;
        treeBody.querySelectorAll('.folder-check').forEach(cb => {
            if (cb.value !== parentPath && cb.value.startsWith(parentPath)) cb.checked = isChecked;
        });
    }

    // --- 核心處理：快速載入 / 變更範圍 / 一般選擇 ---
    async function handlePicker(mode = 'normal') {
        try {
            if (mode === 'quick') {
                currentRootHandle = await getLastHandle();
                if (!currentRootHandle || await currentRootHandle.requestPermission({ mode: 'read' }) !== 'granted') return;
                
                allFiles = [];
                document.getElementById('status').innerText = "⚡ 正在深度遞迴掃描...";
                await scanFilesRecursive(currentRootHandle, "/");
                render();
                document.getElementById('btnReselect').style.display = 'inline-block';
                return; 
            } else if (mode === 'reselect') {
                if (!currentRootHandle) {
                    currentRootHandle = await getLastHandle();
                    if (!currentRootHandle || await currentRootHandle.requestPermission({ mode: 'read' }) !== 'granted') return;
                }
            } else {
                currentRootHandle = await window.showDirectoryPicker();
                await saveHandle(currentRootHandle);
                document.getElementById('btnQuickLoad').style.display = 'inline-block';
            }

            treeBody.innerHTML = "解析目錄中...";
            treeModal.style.display = 'flex';
            folderMap.clear();
            await buildFolderMap(currentRootHandle, "/");
            renderTreeUI();
            document.getElementById('btnReselect').style.display = 'inline-block';
        } catch (e) { console.error(e); treeModal.style.display = 'none'; }
    }

    async function buildFolderMap(handle, path) {
        folderMap.set(path, handle);
        for await (const entry of handle.values()) {
            if (entry.kind === 'directory' && !entry.name.startsWith('.') && !entry.name.startsWith('._')) {
                await buildFolderMap(entry, path + entry.name + "/");
            }
        }
    }

    function renderTreeUI() {
        treeBody.innerHTML = "";
        const sortedPaths = Array.from(folderMap.keys()).sort();
        sortedPaths.forEach(path => {
            const div = document.createElement('div');
            div.className = "tree-item";
            const depth = (path.match(/\//g) || []).length - 1;
            div.style.paddingLeft = (depth * 20) + "px";
            div.innerHTML = `
                <input type="checkbox" class="folder-check" value="${path}" checked onclick="toggleChildren(this)">
                <span>${depth === 0 ? '🏠' : '📂'}</span>
                <label style="cursor:pointer" onclick="this.previousElementSibling.previousElementSibling.click()">${path === "/" ? "根目錄" : path.split('/').filter(Boolean).pop()}</label>
            `;
            treeBody.appendChild(div);
        });
    }

    document.getElementById('btnStartScan').onclick = async () => {
        const selectedPaths = Array.from(document.querySelectorAll('.folder-check:checked')).map(i => i.value);
        if (selectedPaths.length === 0) return alert("請至少選擇一個目錄");
        treeModal.style.display = 'none';
        allFiles = [];
        document.getElementById('status').innerText = "掃描選定路徑中...";
        for (const path of selectedPaths) await scanFilesSingleLevel(folderMap.get(path), path);
        render();
    };

    async function scanFilesRecursive(handle, path) {
        for await (const entry of handle.values()) {
            if (entry.kind === 'file') {
                const name = entry.name;
                if (name.toLowerCase().endsWith('.webp') && !name.startsWith('.') && !name.startsWith('._')) {
                    const file = await entry.getFile();
                    allFiles.push({ name, url: URL.createObjectURL(file), size: file.size, date: file.lastModified, path, originalIndex: allFiles.length });
                }
            } else if (entry.kind === 'directory' && !entry.name.startsWith('.') && !entry.name.startsWith('._')) {
                await scanFilesRecursive(entry, path + entry.name + "/");
            }
        }
    }

    async function scanFilesSingleLevel(handle, path) {
        for await (const entry of handle.values()) {
            if (entry.kind === 'file') {
                const name = entry.name;
                if (name.toLowerCase().endsWith('.webp') && !name.startsWith('.') && !name.startsWith('._')) {
                    const file = await entry.getFile();
                    allFiles.push({ name, url: URL.createObjectURL(file), size: file.size, date: file.lastModified, path, originalIndex: allFiles.length });
                }
            }
        }
    }

    function render() {
        const searchVal = document.getElementById('search').value.toLowerCase();
        const sortType = document.getElementById('sortType').value;
        let list = allFiles.filter(f => f.name.toLowerCase().includes(searchVal));
        if (sortType !== 'random') {
            list.sort((a, b) => {
                let res = 0;
                if (sortType === 'default') res = a.originalIndex - b.originalIndex;
                else if (sortType === 'name') res = a.name.localeCompare(b.name, undefined, { numeric: true });
                else if (sortType === 'folder') res = a.path.localeCompare(b.path);
                else if (sortType === 'date') res = a.date - b.date;
                else if (sortType === 'size') res = a.size - b.size;
                return sortOrder === 'asc' ? res : -res;
            });
        }
        gallery.innerHTML = '';
        list.forEach((f, idx) => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<img src="${f.url}" loading="lazy"><div class="filename">${f.name}</div>`;
            div.onclick = () => openLightbox(list, idx);
            gallery.appendChild(div);
        });
        document.getElementById('status').innerText = `共 ${list.length} 張圖`;
    }

    document.getElementById('btnShuffle').onclick = () => {
        for (let i = allFiles.length - 1; i > 0; i--) { 
            const j = Math.floor(Math.random() * (i + 1)); 
            [allFiles[i], allFiles[j]] = [allFiles[j], allFiles[i]]; 
        }
        document.getElementById('sortType').value = 'random'; 
        render();
    };

    document.getElementById('btnSortOrder').onclick = function() { sortOrder = (sortOrder === 'asc') ? 'desc' : 'asc'; this.innerText = (sortOrder === 'asc') ? '↑' : '↓'; render(); };

    // --- 燈箱與鍵盤互動 ---
    function openLightbox(list, index) { 
        currentViewList = list; currentIndex = index; lb.style.display = 'flex'; 
        document.body.style.overflow = 'hidden'; 
        document.getElementById('slideshowBar').style.display = document.getElementById('showSlideTools').checked ? 'flex' : 'none'; 
        updateImg(); 
    }
    function updateImg() { lbImg.src = currentViewList[currentIndex].url; lbImg.onload = fitImage; }
    function fitImage() {
        const cw = container.clientWidth, ch = container.clientHeight;
        const ir = lbImg.naturalWidth / lbImg.naturalHeight, cr = cw / ch;
        if (ir > cr) { lbImg.style.width = '100%'; lbImg.style.height = 'auto'; } else { lbImg.style.width = 'auto'; lbImg.style.height = '100%'; }
        zoomLevel = 1; moveX = 0; moveY = 0; applyTransform();
    }
    function changeImg(step) { if(currentViewList.length > 0) { currentIndex = (currentIndex + step + currentViewList.length) % currentViewList.length; updateImg(); } }
    function closeLightbox() { lb.style.display = 'none'; document.body.style.overflow = 'auto'; stopSlideshow(); }
    function applyTransform() { lbImg.style.transform = `translate(${moveX}px, ${moveY}px) scale(${zoomLevel})`; }

    window.addEventListener('keydown', (e) => {
        if (lb.style.display !== 'flex') return;
        if (e.key === 'ArrowRight') { stopSlideshow(); changeImg(1); }
        else if (e.key === 'ArrowLeft') { stopSlideshow(); changeImg(-1); }
        else if (e.key === 'Escape') closeLightbox();
        else if (e.key === ' ') { e.preventDefault(); isSlideshow ? stopSlideshow() : startSlideshow(); }
    });

    document.getElementById('btnSlideshow').onclick = (e) => { e.stopPropagation(); isSlideshow ? stopSlideshow() : startSlideshow(); };
    function startSlideshow() { isSlideshow = true; document.getElementById('btnSlideshow').innerText = "⏸ 暫停"; slideTimer = setInterval(() => changeImg(1), parseFloat(document.getElementById('speedRange').value) * 1000); }
    function stopSlideshow() { isSlideshow = false; document.getElementById('btnSlideshow').innerText = "▶ 播放"; clearInterval(slideTimer); }

    // --- IndexedDB ---
    const DB_NAME = "PersonalWebPDB_v1"; // 更新 DB 名稱以反映新專案名
    async function getDB() { return new Promise(res => { const r = indexedDB.open(DB_NAME, 1); r.onupgradeneeded = () => r.result.createObjectStore("handles"); r.onsuccess = () => res(r.result); }); }
    async function saveHandle(h) { (await getDB()).transaction("handles", "readwrite").objectStore("handles").put(h, "last"); }
    async function getLastHandle() { return new Promise(async res => { try { const db = await getDB(); const req = db.transaction("handles").objectStore("handles").get("last"); req.onsuccess = () => res(req.result); } catch(e) { res(null); } }); }
    async function checkLastFolder() { const h = await getLastHandle(); if (h) document.getElementById('btnQuickLoad').style.display = 'inline-block'; }

    // --- 其他繫結 ---
    document.getElementById('btnPicker').onclick = () => handlePicker('normal');
    document.getElementById('btnQuickLoad').onclick = () => handlePicker('quick');
    document.getElementById('btnReselect').onclick = () => handlePicker('reselect');
    document.getElementById('search').oninput = render;
    document.getElementById('sortType').onchange = render;
    document.getElementById('btnFullscreen').onclick = () => document.fullscreenElement ? document.exitFullscreen() : document.documentElement.requestFullscreen();
    document.getElementById('speedRange').oninput = (e) => { document.getElementById('speedDisplay').innerText = e.target.value + "s"; if (isSlideshow) { stopSlideshow(); startSlideshow(); } };
    document.getElementById('showSlideTools').onchange = (e) => { if (lb.style.display === 'flex') document.getElementById('slideshowBar').style.display = e.target.checked ? 'flex' : 'none'; };
</script>
</body>
</html>
